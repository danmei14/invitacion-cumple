<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitación Cumpleaños</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
    background:#f4f1ea;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:'Playfair Display', serif;
    margin:0;
}

.invitation{
    width:90%;
    max-width:600px;
    background:#f7f3ed;
    border:4px solid #b33a4a;
    padding:40px 25px;
    text-align:center;
    color:#7b1e2b;
    box-shadow:0 0 20px rgba(0,0,0,0.1);
    position:relative;
}

/* IMÁGENES LADOS */

.artista{
    position:absolute;
    top:20px;
    right:20px;
}

.hola{
    position:absolute;
    top:20px;
    left:20px;
}

.artista-img,
.hola-img{
    width:120px;
}

/* TEXTO */

.small-text{
    letter-spacing:3px;
    font-size:20px;
}

.title{
    font-family:'Great Vibes', cursive;
    font-size:80px;
    margin:10px 0;
}

.subtitle{
    font-size:32px;
    letter-spacing:3px;
}



.celebrate{
    margin-top:10px;
    font-size:28px;
}

.name{
    font-size:40px;
    font-weight:bold;
    margin:10px 0;
}

.date{
    margin:20px 0;
    font-size:20px;
}

.location{
    font-size:18px;
    line-height:1.6;
    margin-top:10px;
}

.button{
    display:inline-block;
    margin-top:25px;
    padding:15px 25px;
    background:#7b1e2b;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-size:18px;
    transition:0.3s;
}

.button:hover{
    background:#a22a3a;
}

.pandemia img{
    width:120px;
    margin-top:10px;
}

/* RESPONSIVE */

@media (max-width:480px){

.title{
    font-size:65px;
}

.subtitle{
    font-size:26px;
}

.name{
    font-size:32px;
}

.artista-img,
.hola-img{
    width:80px;
}

}

</style>
</head>

<body>

<div class="invitation">

<!-- decoraciones -->


<div class="small-text">ESTÁS INVITADO A MI</div> 
<tr></tr>
<tr></tr>
<div class="title">Birthday party</div>







<div class="celebrate">PARA CELEBRAR MIS</div>

<div class="pandemia">
<img src="descarga.png">
</div>
    <div class="artista">
<img src="happu.png" alt="Dani" class="artista-img">
</div>

<div class="hola">
<img src="happu.png" alt="Dani" class="hola-img">
</div>
<div class="date">
Domingo 7:00 PM | <b>22</b> | marzo 2026
</div>

<div class="location">
📍 Lugar de la cena:<br>
<a href="" target="_blank">
No se sabe todavia
</a>
</div>

<a class="button"
href="https://wa.me/573157047216?text=Hola%20quiero%20confirmar%20mi%20asistencia%20al%20cumpleaños"
target="_blank">
Confirmar asistencia
</a>

</div>

</body>
</html>
