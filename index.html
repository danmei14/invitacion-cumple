<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- Esto hace que se adapte al celular -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitación Cumpleaños</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
    background:#f4f1ea;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:'Playfair Display', serif;
    margin:0;
}

.invitation{
    width:90%;
    max-width:600px;
    background:#f7f3ed;
    border:4px solid #b33a4a;
    padding:40px 25px;
    text-align:center;
    color:#7b1e2b;
    box-shadow:0 0 20px rgba(0,0,0,0.1);
}

.small-text{
    letter-spacing:2px;
    font-size:16px;
}

.title{
    font-family:'Great Vibes', cursive;
    font-size:80px;
    margin:10px 0;
}

.subtitle{
    font-size:32px;
    letter-spacing:3px;
}

.cake{
    font-size:60px;
    margin:20px 0;
}

.celebrate{
    margin-top:10px;
    font-size:18px;
}

.name{
    font-size:40px;
    font-weight:bold;
    margin:10px 0;
}

.date{
    margin:20px 0;
    font-size:20px;
}

.location{
    font-size:18px;
    line-height:1.6;
    margin-top:10px;
}

.button{
    display:inline-block;
    margin-top:25px;
    padding:15px 25px;
    background:#7b1e2b;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-size:18px;
    transition:0.3s;
}

.button:hover{
    background:#a22a3a;
}

/* Ajuste especial para celular */
@media (max-width:480px){

.title{
    font-size:65px;
}

.subtitle{
    font-size:26px;
}

.name{
    font-size:32px;
}

}

</style>
</head>

<body>

<div class="invitation">

<div class="small-text">ESTÁS INVITADO A</div>

<div class="title">Birthday</div>

<div class="subtitle">PARTY</div>

<div class="cake">🎂</div>

<div class="celebrate">PARA CELEBRAR</div>

<div class="name">ANNA'S 20TH BIRTHDAY</div>

<div class="date">
Sábado 7:00 PM | <b>12</b> | Diciembre 2025
</div>

<div class="location">
📍 Lugar de la cena:<br>
<a href="https://www.instagram.com/dessertbrownies/" target="_blank">
Dessert Brownies
</a>
</div>

<a class="button" 
href="https://wa.me/573157047216?text=Hola%20quiero%20confirmar%20mi%20asistencia%20al%20cumpleaños" 
target="_blank">
Confirmar asistencia por WhatsApp
</a>

</div>

</body>
</html>
