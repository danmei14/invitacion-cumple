<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitación Cumpleaños</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
    background:#f4f1ea;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:'Playfair Display', serif;
    margin:0;
}

/* CONTENEDOR CON IMAGEN */

.contenedor{
    position:relative;
    width:90%;
    max-width:600px;
}

.contenedor img{
    width:100%;
    border-radius:10px;
}

/* CONTENIDO SOBRE LA IMAGEN */

.contenido{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:#7b1e2b;
    padding:20px;
}

/* TEXTOS */

.small-text{
    letter-spacing:3px;
    font-size:18px;
}

.title{
    font-family:'Great Vibes', cursive;
    font-size:70px;
    margin:10px 0;
}

.celebrate{
    margin-top:10px;
    font-size:24px;
}

.date{
    margin:15px 0;
    font-size:18px;
}

.location{
    font-size:16px;
    margin-top:10px;
}

.location a{
    color:#7b1e2b;
    font-weight:bold;
}

/* BOTÓN */

.button{
    display:inline-block;
    margin-top:20px;
    padding:14px 22px;
    background:#7b1e2b;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-size:16px;
    transition:0.3s;
}

.button:hover{
    background:#a22a3a;
}

/* RESPONSIVE */

@media (max-width:480px){

.title{
    font-size:50px;
}

.small-text{
    font-size:14px;
}

.celebrate{
    font-size:20px;
}

}

</style>
</head>

<body>

<div class="contenedor">

<!-- IMAGEN DE LA INVITACIÓN -->
<img src="cumpleaños.png" alt="Invitación">

<!-- TEXTO SOBRE LA IMAGEN -->
<div class="contenido">

<div class="small-text">ESTÁS INVITADO A MI</div>

<div class="title">Birthday Party</div>

<div class="celebrate">Para celebrar mis</div>

<div class="date">
Domingo 7:00 PM | <b>22</b> | marzo 2026
</div>

<div class="location">
📍 Lugar de la cena:<br>
<a href="https://www.instagram.com/dessertbrownies/" target="_blank">
Dessert Brownies
</a>
</div>

<a class="button"
href="https://wa.me/573157047216?text=Hola%20quiero%20confirmar%20mi%20asistencia%20al%20cumpleaños"
target="_blank">
Confirmar asistencia
</a>

</div>

</div>

</body>
</html>
