<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitación Cumpleaños</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
    background:#f4f1ea;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:'Playfair Display', serif;
    margin:0;
}

/* CONTENEDOR */

.contenedor{
    position:relative;
    width:90%;
    max-width:550px;
}

/* IMAGEN BASE */

.contenedor img{
    width:100%;
    border-radius:10px;
    display:block;
}

/* TEXTO SOBRE LA IMAGEN */

.contenido{
    position:absolute;
    top:38%;
    left:50%;
    transform:translate(-50%, -50%);
    width:85%;
    text-align:center;
    color:#7b1e2b;
}

/* TEXTOS */

.small-text{
    letter-spacing:3px;
    font-size:18px;
}

.title{
    font-family:'Great Vibes', cursive;
    font-size:60px;
    margin:5px 0;
}

.celebrate{
    font-size:28px;
    font-weight:bold;
}

.date{
    margin-top:10px;
    font-size:16px;
}

.location{
    margin-top:10px;
    font-size:15px;
}

.location a{
    color:#7b1e2b;
    font-weight:bold;
    text-decoration:none;
}

/* IMAGEN DEL 20 */

.numero{
    margin:10px 0;
}

.numero img{
    width:120px;
}

/* BOTÓN */

.button{
    display:inline-block;
    margin-top:15px;
    padding:14px 24px;
    background:#7b1e2b;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-size:16px;
    transition:0.3s;
}

.button:hover{
    background:#a22a3a;
}

/* RESPONSIVE */

@media (max-width:480px){

.small-text{
    font-size:16px;
}

.title{
    font-size:48px;
}

.celebrate{
    font-size:22px;
}

.numero img{
    width:90px;
}

.date{
    font-size:14px;
}

.location{
    font-size:14px;
}

}

</style>
</head>

<body>

<div class="contenedor">

<img src="cumpleaños.png" alt="Invitación">

<div class="contenido">

<div class="small-text">ESTÁS INVITADO A MI</div>

<div class="title">Birthday</div>

<div class="celebrate">Para celebrar mis</div>

<div class="numero">
<img src="descarga.png" alt="20 años">
</div>

<div class="date">
Domingo 7:00 PM | <b>22</b> | marzo 2026
</div>

<div class="location">
📍 Lugar de la cena:<br>
<a href="https://www.instagram.com/ebano_col?igsh=MW42ZXZzaTdkdzRhMQ==" target="_blank">
Dessert Brownies
</a>
</div>

<a class="button"
href="https://wa.me/573157047216?text=Hola%20quiero%20confirmar%20mi%20asistencia%20al%20cumpleaños"
target="_blank">
Confirmar asistencia
</a>

</div>

</div>

</body>
</html>
