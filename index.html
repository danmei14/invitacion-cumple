<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitación Cumpleaños</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

/* BODY */
body{
    background:#f4f1ea;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:'Playfair Display', serif;
    margin:0;
}

/* CONTENEDOR */
.contenedor{
    position:relative;
    width:90%;
    max-width:550px;
}

/* IMAGEN BASE */
.contenedor img{
    width:100%;
    border-radius:10px;
    display:block;
}

/* TEXTO SOBRE LA IMAGEN */
.contenido{
    position:absolute;
    top:38%;
    left:50%;
    transform:translate(-50%, -50%);
    width:85%;
    text-align:center;
    color:#7b1e2b;
}

/* TEXTOS */
.small-text{
    letter-spacing:3px;
    font-size:18px;
    margin:0 0 10px 0; /* margen abajo para separar del siguiente */
}

.title{
    font-family:'Great Vibes', cursive;
    font-size:60px;
    margin:10px 0 10px 0; /* margen arriba y abajo */
}

.celebrate{
    font-size:28px;
    font-weight:bold;
    margin:10px 0 20px 0;
}

.date{
    margin-top:10px;
    font-size:16px;
}

.location{
    margin-top:10px;
    font-size:15px;
}

.location a{
    color:#7b1e2b;
    font-weight:bold;
    text-decoration:none;
}

/* CENTRAR IMAGEN DEL NUMERO */
.numero{
    margin:-20px 0; /* controla espacio arriba y abajo de la imagen */
    display: flex;
    justify-content: center; /* centra la imagen */
}

.numero img{
    width:200px;
}

/* BOTÓN */
.button{
    display:inline-block;
    margin-top:10px;
    padding:14px 24px;
    background:#7b1e2b;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-size:14px;
    transition:0.3s;
}

.button:hover{
    background:#a22a3a;
}

/* RESPONSIVE PARA CELULAR */
@media (max-width:480px){

    .small-text{
        font-size:14px;
        margin-bottom:5px;
    }

    .title{
        font-size:36px;
        margin:5px 0;
    }

    .celebrate{
        font-size:18px;
        margin:5px 0 10px 0;
    }

    .numero img{
        width:100px;
    }

    .date{
        font-size:12px;
    }

    .location{
        font-size:12px;
    }

    .button{
        padding:10px 20px;
        font-size:10px;
        margin-top:10px;
    }

}

</style>
</head>

<body>

<div class="contenedor">

<img src="cumpleaños.png" alt="Invitación">

<div class="contenido">
<br><br><br><br><br><br><br><br><br><br><br><br>
    <div class="small-text" style="margin-top:20px;">ESTÁS INVITADO A MI</div>

    <div class="title" style="margin-top:10px;">Birthday</div>

    <div class="celebrate" style="margin-top:5px;">Para celebrar mis</div>

    <div class="numero">
        <img src="descarga.png" alt="20 años">
    </div>
<br>
    <div class="date">
        Domingo 7:00 PM | <b>22</b> | marzo 2026
    </div>

    <div class="location">
        📍 Lugar de la cena:<br>
        <a href="https://www.instagram.com/ebano_col?igsh=MW42ZXZzaTdkdzRhMQ==" target="_blank">
        Restaurante Ébano
        </a>
        
    </div>
<br>
    <a class="button"
    href="https://wa.me/573157047216?text=Holi,%20si%20voy😘"
    target="_blank">
    Confirmar asistencia 
    </a>


</div>

</div>

</body>
</html>
