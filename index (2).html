<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Cumpleaños</title>

<style>

body{
    margin:0;
    font-family: 'Georgia', serif;
    background:#e9e2d6;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    background:#f4eee4;
    width:90%;
    max-width:420px;
    padding:35px 25px;
    border:3px solid black;
    text-align:center;
    position:relative;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

h1{
    font-size:42px;
    margin:10px 0;
    font-style:italic;
}

.subtitle{
    font-size:24px;
    color:gray;
    letter-spacing:4px;
}

.info{
    margin-top:20px;
    font-size:16px;
    line-height:1.6;
}

.fecha{
    margin-top:20px;
    font-weight:bold;
    font-size:17px;
}

.xoxo{
    font-size:50px;
    color:#c40000;
    margin-top:25px;
    font-family:cursive;
}

.boton{
    margin-top:15px;
    display:inline-block;
    padding:12px 22px;
    background:black;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-size:15px;
    transition:0.3s;
}

.boton:hover{
    background:#444;
}

.decoracion{
    position:absolute;
    font-size:32px;
}

.globo{
    top:-15px;
    right:-5px;
}

.estrella{
    left:-5px;
    top:15px;
}

.labios{
    right:10px;
    top:130px;
}

/* RESPONSIVE PARA CELULAR */

@media (max-width:480px){

h1{
    font-size:34px;
}

.subtitle{
    font-size:20px;
}

.info{
    font-size:15px;
}

.boton{
    width:90%;
}

}

</style>
</head>

<body>

<div class="card">

<div class="decoracion globo">🎈</div>
<div class="decoracion estrella">⭐</div>
<div class="decoracion labios">💋</div>

<h1>Daniela</h1>
<div class="subtitle">BIRTHDAY</div>

<div class="info">
Te invito a pasar conmigo haciendo lo que más me gusta,<br>
comer y compartir 🎉
</div>

<div class="fecha">
📅 18 de Marzo <br>
⏰ 7:00 PM
</div>

<div class="info">
📍 Dessert Brownies
</div>

<a class="boton" href="https://www.instagram.com/dessertbrownies/" target="_blank">
Ver lugar 📍
</a>

<br>

<a class="boton" href="https://wa.me/573157047216" target="_blank">
Confirmar asistencia 💬
</a>

<div class="xoxo">XOXO</div>

</div>

</body>
</html>
